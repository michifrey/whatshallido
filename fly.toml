# Fly.io-Konfiguration (Alternative zu Render).
# Setup:  fly launch --no-deploy --copy-config   (übernimmt diese Datei)
#         fly secrets set ADMIN_TOKEN=<geheim>
#         fly deploy
# Für dauerhafte DB:  fly volumes create bk_data --size 1 --region zrh
#         und unten den [[mounts]]-Block einkommentieren.
app = "berufs-kompass"
primary_region = "zrh"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DATABASE_PATH = "/app/server/data/berufe.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[http_service.checks]
  [http_service.checks.health]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# Dauerhafte Datenbank (optional) – Volume zuerst anlegen (siehe oben):
# [[mounts]]
#   source = "bk_data"
#   destination = "/app/server/data"
